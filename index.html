<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>叽里呱啦 × 小红书 投放数据看板</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      /* Brand Colors */
      --color-xhs-red: #FF2442;
      --color-xhs-red-hover: #E01F3A;
      --color-xhs-red-active: #C41A32;
      --color-jlgl-green: #7EC883;
      --color-warm-orange: #FF9B4E;

      /* Neutrals */
      --color-text-primary: #2D2D3F;
      --color-text-secondary: #6B7280;
      --color-border: #E5E7EB;
      --color-bg-page: #FAFBFC;
      --color-bg-card: #FFFFFF;

      /* Pastel Tints */
      --color-tint-pink: #FFF0F3;
      --color-tint-green: #EEFBEF;
      --color-tint-peach: #FFF4EC;
      --color-tint-blue: #EDF6FF;
      --color-tint-purple: #F3F0FF;

      /* Status */
      --color-positive: #15803D;
      --color-positive-bg: #EEFBEF;
      --color-negative: #DC2626;
      --color-negative-bg: #FFF0F3;

      /* Chart series */
      --chart-1: #FF2442;
      --chart-2: #7EC883;
      --chart-3: #FF9B4E;
      --chart-4: #5B9BD5;
      --chart-5: #A78BFA;
      --chart-6: #F472B6;

      /* Typography */
      --font-primary: 'Inter', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-base: 16px;
      --space-lg: 20px;
      --space-xl: 24px;
      --space-2xl: 32px;
      --space-3xl: 48px;

      /* Border Radius */
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-xl: 0 8px 24px rgba(0, 0, 0, 0.12);

      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-primary);
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Animations */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .animate-in {
      animation: fadeSlideUp 300ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }
    .delay-1 { animation-delay: 50ms; }
    .delay-2 { animation-delay: 100ms; }
    .delay-3 { animation-delay: 150ms; }
    .delay-4 { animation-delay: 200ms; }
    .delay-5 { animation-delay: 250ms; }

    /* Top Nav */
    .top-nav {
      height: 60px;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-3xl);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    .nav-brand-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .nav-brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .nav-brand-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: var(--space-base);
    }
    .nav-tabs {
      display: flex;
      gap: 0;
    }
    .nav-tab {
      padding: var(--space-sm) var(--space-base);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: var(--font-primary);
      height: 60px;
      display: flex;
      align-items: center;
    }
    .nav-tab:hover {
      color: var(--color-text-primary);
    }
    .nav-tab.active {
      color: var(--color-xhs-red);
      border-bottom-color: var(--color-xhs-red);
    }

    .badge-info {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
      background: var(--color-tint-blue);
      color: #2563EB;
    }

    /* Main Content */
    .main-content {
      max-width: 1440px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-3xl);
    }

    .section-title {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      margin-bottom: var(--space-lg);
    }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-lg);
      margin-bottom: var(--space-2xl);
    }
    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .main-content { padding: var(--space-base); }
      .top-nav { padding: 0 var(--space-base); }
    }

    .kpi-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-md);
      transition: box-shadow var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .kpi-card:hover {
      box-shadow: var(--shadow-lg);
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }
    .kpi-card.accent-red::before { background: var(--color-xhs-red); }
    .kpi-card.accent-green::before { background: var(--color-jlgl-green); }
    .kpi-card.accent-orange::before { background: var(--color-warm-orange); }
    .kpi-card.accent-blue::before { background: var(--chart-4); }
    .kpi-card.accent-purple::before { background: var(--chart-5); }

    .kpi-label {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .kpi-value {
      font-family: var(--font-mono);
      font-size: 36px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
      font-variant-numeric: tabular-nums;
      margin-bottom: var(--space-sm);
    }
    .kpi-value.smaller {
      font-size: 28px;
    }
    .kpi-change {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-full);
    }
    .kpi-change.positive {
      background: var(--color-positive-bg);
      color: var(--color-positive);
    }
    .kpi-change.negative {
      background: var(--color-negative-bg);
      color: var(--color-negative);
    }
    .kpi-change.neutral {
      background: #F3F4F6;
      color: var(--color-text-secondary);
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: pre-line;
      margin-top: var(--space-xs);
    }

    /* Chart Cards */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-lg);
      margin-bottom: var(--space-2xl);
    }
    .chart-grid.single {
      grid-template-columns: 1fr;
    }
    @media (max-width: 1024px) {
      .chart-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-md);
    }
    .chart-card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--color-text-primary);
      margin-bottom: var(--space-base);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .chart-card-title .icon {
      width: 20px;
      height: 20px;
      color: var(--color-text-secondary);
    }

    /* Data Table */
    .table-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: var(--space-2xl);
    }
    .table-card-header {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-card-title {
      font-size: 16px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: var(--color-bg-page);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--color-text-secondary);
      padding: var(--space-md) var(--space-base);
      text-align: left;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }
    thead th.num {
      text-align: right;
    }
    tbody td {
      padding: 10px var(--space-base);
      font-size: 14px;
      border-bottom: 1px solid var(--color-border);
    }
    tbody td.num {
      text-align: right;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }
    tbody tr:nth-child(even) {
      background: var(--color-bg-page);
    }
    tbody tr:hover {
      background: var(--color-tint-pink);
    }

    .badge-channel {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
    }
    .badge-channel.kz {
      background: var(--color-tint-blue);
      color: #2563EB;
    }
    .badge-channel.yy {
      background: var(--color-tint-peach);
      color: #C2410C;
    }
    .badge-channel.overall {
      background: var(--color-tint-pink);
      color: var(--color-xhs-red);
    }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 500;
    }
    .badge-status.complete {
      background: var(--color-positive-bg);
      color: var(--color-positive);
    }
    .badge-status.in-progress {
      background: var(--color-tint-peach);
      color: #C2410C;
    }
    .badge-status.converting {
      background: #DBEAFE;
      color: #1D4ED8;
    }
    .badge-status.pending-class {
      background: #FEF3C7;
      color: #B45309;
    }
    .badge-status.collecting {
      background: #EDE9FE;
      color: #7C3AED;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: var(--space-2xl) 0;
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    /* Tooltip override for Recharts */
    .recharts-default-tooltip {
      background: var(--color-text-primary) !important;
      border: none !important;
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow-xl) !important;
    }
    .recharts-tooltip-label {
      color: #fff !important;
      font-weight: 600 !important;
    }
    .recharts-tooltip-item {
      color: #e0e0e0 !important;
    }

    /* Channel filter buttons */
    .channel-filters {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-base);
    }
    .channel-btn {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      font-family: var(--font-primary);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
    }
    .channel-btn:hover {
      background: var(--color-bg-page);
    }
    .channel-btn.active {
      background: var(--color-xhs-red);
      color: white;
      border-color: var(--color-xhs-red);
    }

    /* Recharts legend fix */
    .recharts-legend-item-text {
      font-family: var(--font-primary) !important;
      font-size: 12px !important;
      color: var(--color-text-secondary) !important;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-3xl);
      color: var(--color-text-secondary);
    }

    /* Scrollbar */
    .table-scroll {
      overflow-x: auto;
    }

    /* Period selector */
    .period-selector {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .period-selector select {
      padding: 6px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg-card);
      font-family: var(--font-primary);
      font-size: 13px;
      color: var(--color-text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      LineChart, Line, BarChart, Bar, ComposedChart, Area, XAxis, YAxis,
      CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell, ReferenceLine
    } = Recharts;

    // ============================================================
    // Utility helpers
    // ============================================================
    const fmt = (n, decimals = 0) => {
      if (n == null || isNaN(n)) return '—';
      return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    };
    const fmtCurrency = (n) => {
      if (n == null || isNaN(n)) return '—';
      return '¥' + fmt(Math.abs(n), 0);
    };
    const fmtPct = (n, d = 2) => {
      if (n == null || isNaN(n)) return '—';
      return fmt(n, d) + '%';
    };
    const pctChange = (curr, prev) => {
      if (!prev || prev === 0) return null;
      return ((curr - prev) / prev) * 100;
    };

    // ============================================================
    // Custom Tooltip
    // ============================================================
    function CustomTooltip({ active, payload, label }) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div style={{
          background: '#2D2D3F', color: '#fff', borderRadius: 8,
          padding: '12px 16px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
          fontSize: 13, lineHeight: 1.6
        }}>
          <div style={{ fontWeight: 600, marginBottom: 4 }}>{label}</div>
          {payload.map((p, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{
                width: 10, height: 10, borderRadius: '50%',
                background: p.color, display: 'inline-block'
              }} />
              <span style={{ color: '#ccc' }}>{p.name}:</span>
              <span style={{ fontWeight: 600, fontFamily: 'var(--font-mono)' }}>
                {typeof p.value === 'number' ? (p.name.includes('%') || p.name.includes('Rate') || p.name.includes('率')
                  ? fmtPct(p.value) : p.name.includes('CPL') || p.name.includes('CAA') || p.name.includes('Spend') || p.name.includes('投放')
                  ? fmtCurrency(p.value) : fmt(p.value)) : p.value}
              </span>
            </div>
          ))}
        </div>
      );
    }

    // ============================================================
    // UE Tooltip (with blended value)
    // ============================================================
    function UETooltip({ active, payload, label, blendedKey, blendedLabel }) {
      if (!active || !payload || !payload.length) return null;
      const entry = payload[0]?.payload;
      const blendedVal = entry ? entry[blendedKey] : null;
      return (
        <div style={{
          background: '#2D2D3F', color: '#fff', borderRadius: 8,
          padding: '12px 16px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
          fontSize: 13, lineHeight: 1.6
        }}>
          <div style={{ fontWeight: 600, marginBottom: 4 }}>{label}</div>
          {payload.map((p, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{
                width: 10, height: 10, borderRadius: '50%',
                background: p.color, display: 'inline-block'
              }} />
              <span style={{ color: '#ccc' }}>{p.name}:</span>
              <span style={{ fontWeight: 600, fontFamily: 'var(--font-mono)' }}>
                {p.value != null ? `¥${fmt(Math.round(p.value))}` : '—'}
              </span>
            </div>
          ))}
          {blendedVal != null && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, borderTop: '1px solid rgba(255,255,255,0.15)', marginTop: 6, paddingTop: 6 }}>
              <span style={{
                width: 10, height: 10, borderRadius: '50%',
                background: '#A78BFA', display: 'inline-block'
              }} />
              <span style={{ color: '#ccc' }}>{blendedLabel || '综合'}:</span>
              <span style={{ fontWeight: 600, fontFamily: 'var(--font-mono)' }}>
                ¥{fmt(Math.round(blendedVal))}
              </span>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // KPI Card
    // ============================================================
    function KPICard({ label, value, change, accent, sub, icon, delay = 0 }) {
      const changeClass = change > 0 ? 'positive' : change < 0 ? 'negative' : 'neutral';
      const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '—';
      return (
        <div className={`kpi-card accent-${accent} animate-in delay-${delay}`}>
          <div className="kpi-label">
            {icon && <span dangerouslySetInnerHTML={{ __html: icon }} />}
            {label}
          </div>
          <div className={`kpi-value ${String(value).length > 6 ? 'smaller' : ''}`}>{value}</div>
          {change != null && (
            <span className={`kpi-change ${changeClass}`}>
              {arrow} {change > 0 ? '+' : ''}{fmt(change, 1)}% 环比
            </span>
          )}
          {sub && <div className="kpi-sub">{sub}</div>}
        </div>
      );
    }

    // ============================================================
    // Main App
    // ============================================================
    function App() {
      const [weeklyData, setWeeklyData] = React.useState(null);
      const [dailyData, setDailyData] = React.useState(null);
      const [activeTab, setActiveTab] = React.useState('overview');
      const [channelFilter, setChannelFilter] = React.useState('overall');
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        Promise.all([
          fetch('data/weekly.json').then(r => r.json()),
          fetch('data/daily.json').then(r => r.json()),
        ]).then(([w, d]) => {
          setWeeklyData(w);
          setDailyData(d);
          setLoading(false);
        }).catch(err => {
          console.error('Failed to load data:', err);
          setLoading(false);
        });
      }, []);

      if (loading) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', flexDirection: 'column', gap: 16 }}>
            <div className="nav-brand-icon" style={{ width: 48, height: 48 }}><img src="apple-touch-icon.png" alt="Logo" /></div>
            <div style={{ color: 'var(--color-text-secondary)' }}>正在加载数据...</div>
          </div>
        );
      }

      if (!weeklyData || !dailyData) {
        return <div className="empty-state">数据加载失败，请确认 data/weekly.json 和 data/daily.json 文件存在。</div>;
      }

      const weeks = weeklyData.weeks;
      const completeWeeks = weeks.filter(w => w.is_complete);
      const latestComplete = completeWeeks[completeWeeks.length - 1];
      const prevComplete = completeWeeks.length > 1 ? completeWeeks[completeWeeks.length - 2] : null;
      const inProgressWeeks = weeks.filter(w => !w.is_complete);
      const latestWeek = weeks[weeks.length - 1];

      // Blended unit economics helper
      // CAA = LTV - (CPL*(1-rebate) + sales_cost) / conv_rate
      const cfg = weeklyData.config;
      const blendedMetrics = (w) => {
        if (!w) return { leads: 0, spend: 0, cpl: null, cac: null, caa: null, convRate: 0 };
        const leads = w.overall?.leads || 0;
        const spend = (w.kz?.spend || 0) + (w.yy?.spend || 0);
        const cpl = leads > 0 && spend > 0 ? spend / leads : null;
        const convRate = (w.overall?.conversion_rate || 0) / 100; // decimal
        let cac = null;
        let caa = null;
        if (cpl != null && convRate > 0) {
          cac = (cpl * (1 - cfg.rebate) + cfg.sales_cost) / convRate;
          caa = cfg.ltv - cac;
        }
        return { leads, spend, cpl, cac, caa, convRate: w.overall?.conversion_rate || 0 };
      };

      const latest = blendedMetrics(latestComplete);
      const prev = blendedMetrics(prevComplete);

      // KPI values from latest complete week (all blended/overall)
      const latestLeads = latest.leads;
      const prevLeads = prev.leads;
      const leadsChange = pctChange(latestLeads, prevLeads);

      const latestConv = latest.convRate;
      const prevConv = prev.convRate;
      const convChange = pctChange(latestConv, prevConv);

      // Blended CPL (total spend / total leads)
      const latestCPL = latest.cpl;
      const prevCPL = prev.cpl;
      const cplChange = pctChange(latestCPL, prevCPL);

      // Blended CAA
      const latestCAA = latest.caa;
      const prevCAA = prev.caa;
      const caaChange = pctChange(latestCAA != null ? Math.abs(latestCAA) : null, prevCAA != null ? Math.abs(prevCAA) : null);

      // Compute total spend for latest complete week
      const latestSpend = latest.spend;
      const prevSpend = prev.spend;
      const spendChange = pctChange(latestSpend, prevSpend);

      // Weekly chart data
      const weeklyChartData = weeks.map(w => ({
        label: w.label + (w.is_complete ? '' : '*'),
        period: w.period,
        isComplete: w.is_complete,
        leads: w.overall?.leads || 0,
        kzLeads: w.kz?.leads || 0,
        yyLeads: w.yy?.leads || 0,
        convRate: w.overall?.conversion_rate || null,
        kzConvRate: w.kz?.conversion_rate || null,
        yyConvRate: w.yy?.conversion_rate || null,
        kzCPL: w.kz?.cpl || null,
        yyCPL: w.yy?.cpl || null,
        kzCAC: w.kz?.cac || null,
        yyCAC: w.yy?.cac || null,
        kzCAA: w.kz?.caa || null,
        yyCAA: w.yy?.caa || null,
        kzSpend: w.kz?.spend || 0,
        yySpend: w.yy?.spend || 0,
        totalSpend: (w.kz?.spend || 0) + (w.yy?.spend || 0),
        blendedCPL: blendedMetrics(w).cpl,
        blendedCAC: blendedMetrics(w).cac,
        blendedCAA: blendedMetrics(w).caa,
      }));

      // Daily chart data — last 14 days with leads > 0
      const recentDays = dailyData.days
        .filter(d => d.total_leads > 0 || d.total_spend > 0)
        .slice(-21);

      const dailyChartData = recentDays.map(d => {
        const date = new Date(d.date);
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        return {
          label: `${date.getMonth() + 1}/${date.getDate()}`,
          dayLabel: `${date.getMonth() + 1}/${date.getDate()} ${dayNames[date.getDay()]}`,
          kzLeads: d.kz_leads,
          yyLeads: d.yy_leads,
          totalLeads: d.total_leads,
          kzSpend: d.kz_spend,
          yySpend: d.yy_spend,
          totalSpend: d.total_spend,
          kzCPL: d.kz_cpl,
          yyCPL: d.yy_cpl,
          totalCPL: d.total_cpl,
        };
      });

      return (
        <div>
          {/* Top Navigation */}
          <nav className="top-nav">
            <div className="nav-brand">
              <div className="nav-brand-icon"><img src="apple-touch-icon.png" alt="Logo" /></div>
              <span className="nav-brand-text">叽里呱啦 × 小红书 投放数据</span>
            </div>
            <div className="nav-tabs">
              <button className={`nav-tab ${activeTab === 'overview' ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>
                每周
              </button>
              <button className={`nav-tab ${activeTab === 'daily' ? 'active' : ''}`} onClick={() => setActiveTab('daily')}>
                每日
              </button>
              <button className={`nav-tab ${activeTab === 'economics' ? 'active' : ''}`} onClick={() => setActiveTab('economics')}>
                UE模型
              </button>
            </div>
            <div className="nav-right">
              <span className="badge-info">
                数据截至: {weeklyData.generated_at}
              </span>
            </div>
          </nav>

          <div className="main-content">
            {activeTab === 'overview' && (
              <OverviewTab
                weeks={weeks}
                weeklyChartData={weeklyChartData}
                latestComplete={latestComplete}
                prevComplete={prevComplete}
                latestLeads={latestLeads}
                leadsChange={leadsChange}
                latestConv={latestConv}
                convChange={convChange}
                latestCPL={latestCPL}
                cplChange={cplChange}
                latestCAA={latestCAA}
                latestSpend={latestSpend}
                spendChange={spendChange}
                inProgressWeeks={inProgressWeeks}
                channelFilter={channelFilter}
                setChannelFilter={setChannelFilter}
              />
            )}
            {activeTab === 'daily' && (
              <DailyTab dailyChartData={dailyChartData} />
            )}
            {activeTab === 'economics' && (
              <EconomicsTab
                weeklyChartData={weeklyChartData}
                config={weeklyData.config}
              />
            )}
          </div>

          <footer className="footer">
            叽里呱啦增长特工队
          </footer>
        </div>
      );
    }

            <div className="chart-card">
              <div className="chart-card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="icon"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
                每期 CAA
              </div>
              <ResponsiveContainer width="100%" height={360}>
                <ComposedChart data={currentData} margin={{ top: 10, right: 20, bottom: 0, left: 0 }}>
                  <CartesianGrid stroke="#E5E7EB" strokeDasharray="4 4" strokeWidth={0.5} />
                  <XAxis dataKey="label" tick={{ fontSize: 12, fill: '#6B7280' }} />
                  <YAxis tick={{ fontSize: 12, fill: '#6B7280' }} tickFormatter={v => `¥${v}`} />
                  <Tooltip content={<UETooltip blendedKey="blendedCAA" blendedLabel="综合 CAA" />} />
                  <Legend iconType="circle" iconSize={8}
                    wrapperStyle={{ fontSize: 12, paddingTop: 8 }}
                    content={() => (
                      <div style={{ display: 'flex', justifyContent: 'center', gap: 20, fontSize: 12, paddingTop: 8, flexWrap: 'wrap' }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#6B7280' }}>客资收集</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#6B7280' }}>应用推广</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#6B7280' }}>综合</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 12 }}>
                          <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#FF2442', display: 'inline-block' }}></span> CAA &gt; 0 (盈利)
                        </span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#22A856', display: 'inline-block' }}></span> CAA &lt; 0 (亏损)
                        </span>
                      </div>
                    )} />
                  <ReferenceLine y={0} stroke="#E5E7EB" strokeWidth={2} />
                  <Bar dataKey="kzCAA" name="客资收集 CAA" barSize={24}
                    radius={[4, 4, 0, 0]}>
                    {currentData.map((entry, i) => (
                      <Cell key={i}
                        fill={entry.kzCAA != null && entry.kzCAA >= 0 ? '#FF2442' : '#22A856'}
                        fillOpacity={0.7} />
                    ))}
                  </Bar>
                  <Bar dataKey="yyCAA" name="应用推广 CAA" barSize={24}>
                    {currentData.map((entry, i) => (
                      <Cell key={i}
                        fill={entry.yyCAA != null && entry.yyCAA >= 0 ? '#FF2442' : '#22A856'}
                        fillOpacity={0.7} />
                    ))}
                  </Bar>
                  <Bar dataKey="blendedCAA" name="综合 CAA" barSize={24}
                    radius={[4, 4, 0, 0]}>
                    {currentData.map((entry, i) => (
                      <Cell key={i}
                        fill={entry.blendedCAA != null && entry.blendedCAA >= 0 ? '#FF2442' : '#22A856'}
                        fillOpacity={0.7} />
                    ))}
                  </Bar>
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </div>
            );
          })()}
        </div>
      );
    }

    // ============================================================
    // Weekly Data Table
    // ============================================================
    function WeeklyTable({ weeks }) {
      const sorted = [...weeks].reverse();
      // In-progress weeks sorted oldest-first for status assignment
      const ipWeeks = weeks.filter(w => !w.is_complete);
      const ipLabels = ipWeeks.map(w => w.label);
      // oldest in-progress = 转化中, next = 待开班, newest = 进量中
      const getStatus = (w) => {
        if (w.is_complete) return { text: '已完成', cls: 'complete' };
        const idx = ipLabels.indexOf(w.label);
        if (idx === 0) return { text: '转化中', cls: 'converting' };
        if (idx === 1) return { text: '待开班', cls: 'pending-class' };
        return { text: '进量中', cls: 'collecting' };
      };
      return (
        <div className="table-card animate-in delay-5">
          <div className="table-card-header">
            <span className="table-card-title">每期明细</span>
          </div>
          <div className="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>期次</th>
                  <th>状态</th>
                  <th className="num">总 Leads</th>
                  <th className="num">客资收集</th>
                  <th className="num">应用推广</th>
                  <th className="num">综合 CVR</th>
                  <th className="num">客资 CVR</th>
                  <th className="num">应用 CVR</th>
                  <th className="num">总花费</th>
                  <th className="num">综合 CPL</th>
                  <th className="num">综合 CAA</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((w, i) => {
                  const totalSpend = (w.kz?.spend || 0) + (w.yy?.spend || 0);
                  return (
                    <tr key={i}>
                      <td style={{ fontWeight: 600 }}>{w.label}期</td>
                      <td>
                        {(() => { const s = getStatus(w); return (
                          <span className={`badge-status ${s.cls}`}>{s.text}</span>
                        ); })()}
                      </td>
                      <td className="num" style={{ fontWeight: 600 }}>{fmt(w.overall?.leads)}</td>
                      <td className="num">{fmt(w.kz?.leads)}</td>
                      <td className="num">{fmt(w.yy?.leads || 0)}</td>
                      <td className="num" style={{ fontWeight: 600, color: (w.overall?.conversion_rate || 0) > 5 ? 'var(--color-positive)' : 'inherit' }}>
                        {fmtPct(w.overall?.conversion_rate)}
                      </td>
                      <td className="num">{fmtPct(w.kz?.conversion_rate)}</td>
                      <td className="num">{fmtPct(w.yy?.conversion_rate)}</td>
                      <td className="num">{totalSpend > 0 ? `¥${fmt(totalSpend)}` : '—'}</td>
                      <td className="num">{w.kz?.cpl != null ? `¥${fmt(w.kz.cpl)}` : '—'}</td>
                      <td className="num" style={{
                        color: w.kz?.caa != null ? (w.kz.caa >= 0 ? 'var(--color-positive)' : 'var(--color-negative)') : 'inherit',
                        fontWeight: w.kz?.caa != null ? 600 : 400
                      }}>
                        {w.kz?.caa != null ? `¥${fmt(w.kz.caa)}` : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============================================================
    // Mount
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
